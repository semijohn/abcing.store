<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABCing SaaS Dashboard</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; background: #f5f6fa; }

    /* Sidebar */
    .sidebar {
      width: 80px;
      background: #1f2937;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      position: fixed;
      height: 100%;
      transition: width 0.3s;
    }
    .sidebar:hover { width: 220px; }
    .sidebar .logo { font-size: 22px; font-weight: 700; margin-bottom: 40px; white-space: nowrap; }
    .sidebar a {
      display: flex;
      align-items: center;
      color: #cfd3dc;
      text-decoration: none;
      padding: 15px 20px;
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
      transition: background 0.3s, color 0.3s;
      overflow: hidden;
    }
    .sidebar a:hover { background: #374151; color: #fff; }
    .sidebar a i { font-size: 22px; min-width: 30px; text-align: center; }
    .sidebar span { margin-left: 10px; opacity: 0; transition: 0.3s; white-space: nowrap; font-weight: 500; }
    .sidebar:hover span { opacity: 1; }

    /* Main Content */
    .main { margin-left: 80px; padding: 20px; width: 100%; transition: margin-left 0.3s; }
    .sidebar:hover ~ .main { margin-left: 220px; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 28px; color: #111827; }
    .header input { padding: 8px 15px; border-radius: 8px; border: 1px solid #ccc; width: 220px; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }

    .card h3 { margin-bottom: 10px; font-size: 18px; color: #1f2937; }
    .card p { font-size: 14px; color: #6b7280; }

    footer { text-align: center; margin-top: 30px; color: #9ca3af; font-size: 14px; }

    /* Responsive */
    @media(max-width: 768px){
      .sidebar { width: 60px; }
      .sidebar:hover { width: 200px; }
      .main { margin-left: 60px; }
      .sidebar:hover ~ .main { margin-left: 200px; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">ABCing</div>
  <a href="#"><i class="material-icons">dashboard</i><span>Dashboard</span></a>
  <a href="#"><i class="material-icons">work</i><span>Projects</span></a>
  <a href="#"><i class="material-icons">people</i><span>Clients</span></a>
  <a href="#"><i class="material-icons">analytics</i><span>Analytics</span></a>
  <a href="#"><i class="material-icons">settings</i><span>Settings</span></a>
  <a href="#"><i class="material-icons">logout</i><span>Logout</span></a>
</div>

<!-- Main Content -->
<div class="main">
  <div class="header">
    <h1>Welcome to ABCing SaaS</h1>
    <input type="search" placeholder="Search...">
  </div>

  <div class="cards">
    <div class="card">
      <h3>Total Projects</h3>
      <p><a href="http://565755.shop/">shop</a>
<a href="http://565756.shop/">shop</a>
<a href="http://565757.shop/">shop</a></a></p>
    </div>

    <div class="card">
      <h3>Clients</h3>
      <p>15 active clients</p>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <p>$23,800 earned this month</p>
    </div>

    <div class="card">
      <h3>Tasks Pending</h3>
      <p>7 tasks waiting review</p>
    </div>
  </div>

  <footer>
    © 2026 abcing.store
  </footer>
</div>

</body>
</html>
